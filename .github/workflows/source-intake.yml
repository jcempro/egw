name: Receber fontes por issue

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  intake:
    if: contains(github.event.issue.labels.*.name, 'fonte: aguardando analise') || startsWith(github.event.issue.title, 'Fonte de publicacao:')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run egw:intake-issue -- --event="$GITHUB_EVENT_PATH" --report=build/issue-source-intake/report.json --comment=build/issue-source-intake/comment.md --labels=build/issue-source-intake/labels.json
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const marker = `<!-- egw-source-intake:${context.payload.issue.id} -->`;
            const comment = `${marker}\n${fs.readFileSync("build/issue-source-intake/comment.md", "utf8")}`;
            const labels = JSON.parse(fs.readFileSync("build/issue-source-intake/labels.json", "utf8"));
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const previous = comments.find((item) => item.user.type === "Bot" && item.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels
            });
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-source-intake
          path: build/issue-source-intake/
          if-no-files-found: ignore
